# Ежедневный прогон новостей (второй запуск в день). 18:00 UTC.
# Результаты мержатся в crawl/daily поверх данных от 06:00.
name: Daily news crawl

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Save main news data before branch switch
        run: |
          cp -r web/data/news /tmp/main_news 2>/dev/null || true

      - name: Fetch and checkout crawl/daily if exists
        run: |
          git fetch origin crawl/daily 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/crawl/daily; then
            git checkout -B crawl/daily origin/crawl/daily
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore accumulated news data (merge main + crawl/daily)
        run: |
          # Мержим main и crawl/daily на уровне items — берём объединение,
          # image_url из любого источника. main авторитетен для обогащённых данных.
          python3 << 'PYEOF'
          import json, os

          def load_by_id(path):
              try:
                  return {i["news_id"]: i for i in json.load(open(path))}
              except Exception:
                  return {}

          main_dir   = "/tmp/main_news"
          crawl_dir  = "web/data/news"
          out_dir    = "data/news"
          os.makedirs(out_dir, exist_ok=True)

          sources = set()
          if os.path.isdir(main_dir):  sources.update(os.listdir(main_dir))
          if os.path.isdir(crawl_dir): sources.update(os.listdir(crawl_dir))

          for src in sources:
              main_f  = os.path.join(main_dir,  src, "all_news.json")
              crawl_f = os.path.join(crawl_dir, src, "all_news.json")
              src_out = os.path.join(out_dir, src)
              os.makedirs(src_out, exist_ok=True)

              main_items  = load_by_id(main_f)
              crawl_items = load_by_id(crawl_f)

              merged = dict(crawl_items)
              for nid, item in main_items.items():
                  if nid not in merged:
                      merged[nid] = item
                  else:
                      if not merged[nid].get("image_url") and item.get("image_url"):
                          merged[nid]["image_url"] = item["image_url"]

              if merged:
                  out_path = os.path.join(src_out, "all_news.json")
                  json.dump(list(merged.values()), open(out_path, "w"), ensure_ascii=False, indent=2)
                  print(f"[news:{src}] merged {len(merged)} items "
                        f"(main={len(main_items)}, crawl/daily={len(crawl_items)})")
          PYEOF

      - name: Run news parsers (daily mode)
        run: python -m src.main --news --news-daily

      - name: Mirror data and state into web/ for site
        run: |
          # Merge: копируем data/* в web/data/* БЕЗ удаления — сохраняем periods, старые дни.
          mkdir -p web/data
          for dir in data/*/; do
            [ -d "$dir" ] || continue
            src=$(basename "$dir")
            mkdir -p "web/data/$src"
            cp -r "$dir"/* "web/data/$src/" 2>/dev/null || true
          done
          rm -rf web/state && cp -r state web/state
          echo "Mirrored data/ → web/data (merge), state/ → web/state"

      - name: Push to branch crawl/daily
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ state/ web/data/ web/state/ 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(data): daily news crawl $(date -u +%Y-%m-%d)"
          git push --force origin HEAD:crawl/daily
